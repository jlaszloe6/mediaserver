networks:
  mediaserver:
    name: mediaserver

services:

  jellyfin:
    # jellyfin (linuxserver, pinned)
    image: lscr.io/linuxserver/jellyfin@sha256:ce50c477eb0450c47e215b3016c72fb77d4c376be15ca45b9a04a65f99ea0e07
    container_name: jellyfin
    networks:
      - mediaserver
    ports:
      - "${SERVER_IP:-127.0.0.1}:8096:8096"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/jellyfin:/config
      - ${MEDIA_ROOT}/media/tv:/tv:ro
      - ${MEDIA_ROOT}/media/movies:/movies:ro
    mem_limit: 4g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 5s
      retries: 3


  transmission:
    # transmission v4.0.6
    image: lscr.io/linuxserver/transmission@sha256:d2183a00bbd5dbb083b14dcd65419379bfd91e0965b52849642354ec3d246452
    container_name: transmission
    networks:
      - mediaserver
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
      - PEERPORT=51413
      - TRANSMISSION_SPEED_LIMIT_DOWN_ENABLED=${TRANSMISSION_DOWNLOAD_LIMIT_ENABLED:-false}
      - TRANSMISSION_SPEED_LIMIT_DOWN=${TRANSMISSION_DOWNLOAD_LIMIT:-0}
      - TRANSMISSION_SPEED_LIMIT_UP_ENABLED=${TRANSMISSION_UPLOAD_LIMIT_ENABLED:-true}
      - TRANSMISSION_SPEED_LIMIT_UP=${TRANSMISSION_UPLOAD_LIMIT:-50}
    volumes:
      - ./config/transmission:/config
      - ./scripts/transmission-speed-limits.sh:/custom-cont-init.d/speed-limits.sh:ro
      - ${MEDIA_ROOT}/torrents:/downloads
      - ${MEDIA_ROOT}/watch:/watch
    ports:
      - "51413:51413"
      - "51413:51413/udp"
    mem_limit: 2g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/transmission/rpc || [ $? -eq 22 ]"]
      interval: 30s
      timeout: 5s
      retries: 3


  sonarr:
    # sonarr v4.0.14
    image: lscr.io/linuxserver/sonarr@sha256:21c1c3d52248589bb064f5adafec18cad45812d7a01d317472955eef051e619b
    container_name: sonarr
    networks:
      - mediaserver
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_ROOT}:/data
    mem_limit: 1g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  radarr:
    # radarr v5.20.2
    image: lscr.io/linuxserver/radarr@sha256:ca43905eaf2dd11425efdcfe184892e43806b1ae0a830440c825cecbc2629cfb
    container_name: radarr
    networks:
      - mediaserver
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_ROOT}:/data
    mem_limit: 1g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  prowlarr:
    # prowlarr v1.32.2
    image: lscr.io/linuxserver/prowlarr@sha256:a8fe7b9c502f979146b6d0f22438b825c38e068241bb8a708c473062dffdbb03
    container_name: prowlarr
    networks:
      - mediaserver
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/prowlarr:/config
    mem_limit: 512m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  seerr:
    # seerr latest
    image: ghcr.io/seerr-team/seerr@sha256:b35ba0461c4a1033d117ac1e5968fd4cbe777899e4cbfbdeaf3d10a42a0eb7e9
    container_name: seerr
    networks:
      - mediaserver
    environment:
      - TZ=Europe/Budapest
    volumes:
      - ./config/overseerr:/app/config
    mem_limit: 512m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3


  caddy:
    build:
      context: ./caddy
      network: host
    container_name: caddy
    networks:
      - mediaserver
    ports:
      - "443:443"
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - CADDY_DOMAIN_JELLYFIN=${CADDY_DOMAIN_JELLYFIN}
      - CADDY_DOMAIN_SEERR=${CADDY_DOMAIN_SEERR}
      - CADDY_DOMAIN_STATUS=${CADDY_DOMAIN_STATUS}
      - MAXMIND_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/data:/data
      - ./config/caddy/config:/config
    mem_limit: 512m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3


  duckdns:
    # duckdns latest
    image: lscr.io/linuxserver/duckdns@sha256:afe50a2ef043a63e33ffe6e6e119a7a82db999eab966aef2a33611fd89f81117
    container_name: duckdns
    networks:
      - mediaserver
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
      - SUBDOMAINS=${DUCKDNS_SUBDOMAINS}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=ipv4
      - LOG_FILE=true
    volumes:
      - ./config/duckdns:/config
    mem_limit: 128m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true


  statuspage:
    build:
      context: ./status-page
    container_name: statuspage
    networks:
      - mediaserver
    environment:
      - SECRET_KEY=${STATUSPAGE_SECRET_KEY}
      - ALLOWED_EMAILS=${STATUSPAGE_ALLOWED_EMAILS}
      - BASE_URL=${STATUSPAGE_BASE_URL}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - JELLYFIN_EXTERNAL_URL=${JELLYFIN_EXTERNAL_URL}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - SERVER_NAME=${SERVER_NAME:-Media Server}
    volumes:
      - ./config/statuspage:/app/data
    mem_limit: 256m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3

  cron:
    build:
      context: .
      dockerfile: cron/Dockerfile
    container_name: cron
    networks:
      - mediaserver
    environment:
      - TZ=Europe/Budapest
      - STATUSPAGE_DB_PATH=/config/statuspage/statuspage.db
      - SERVER_NAME=${SERVER_NAME:-Media Server}
    volumes:
      - ./scripts:/scripts:ro
      - ./.env:/config/.env:ro
      - ./config/statuspage:/config/statuspage:ro
      - ./config:/config/all-configs:ro
      - ./.ssh:/config/ssh-keys:ro
      - ${MEDIA_ROOT}:/mnt/mediaserver
      - cron-state:/var/tmp
      - cron-logs:/var/log/cron
    mem_limit: 256m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  cron-state:
  cron-logs:
