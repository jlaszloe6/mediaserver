services:

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
      - VERSION=docker
    volumes:
      - ./config/plex:/config
      - ${MEDIA_ROOT}/media/tv:/tv
      - ${MEDIA_ROOT}/media/movies:/movies
    restart: unless-stopped


  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
      - PEERPORT=51413
    volumes:
      - ./config/transmission:/config
      - ${MEDIA_ROOT}/torrents:/downloads
      - ${MEDIA_ROOT}/watch:/watch
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    restart: unless-stopped


  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "8989:8989"
    restart: unless-stopped


  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "7878:7878"
    restart: unless-stopped


  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=Europe/Budapest
      - LOG_LEVEL=info
    ports:
      - "8191:8191"
    restart: unless-stopped


  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    depends_on:
      - flaresolverr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
    volumes:
      - ./config/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped


  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
    volumes:
      - ./config/tautulli:/config
    restart: unless-stopped


  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    network_mode: host
    environment:
      - TZ=Europe/Budapest
    volumes:
      - ./config/overseerr:/app/config
    restart: unless-stopped


  caddy:
    build:
      context: ./caddy
      network: host
    container_name: caddy
    network_mode: host
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/data:/data
      - ./config/caddy/config:/config
    restart: unless-stopped


  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
      - SUBDOMAINS=${DUCKDNS_SUBDOMAINS}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=ipv4
      - LOG_FILE=true
    volumes:
      - ./config/duckdns:/config
    restart: unless-stopped


  prunarr:
    image: ghcr.io/haijeploeg/prunarr:latest
    container_name: prunarr
    network_mode: host
    entrypoint: ["sh", "-c", "while true; do sleep 86400; done"]
    environment:
      - RADARR_API_KEY=${RADARR_API_KEY}
      - RADARR_URL=http://localhost:7878
      - SONARR_API_KEY=${SONARR_API_KEY}
      - SONARR_URL=http://localhost:8989
      - TAUTULLI_API_KEY=${TAUTULLI_API_KEY}
      - TAUTULLI_URL=http://localhost:8181
      - LOG_LEVEL=INFO
    restart: unless-stopped
