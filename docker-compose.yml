services:

  plex:
    # plex v1.43.0
    image: lscr.io/linuxserver/plex@sha256:79dfc89947410ec120a3e34cf68f746f6f154de20772e6f27b9998ca9bd65a5e
    container_name: plex
    # host network required: Plex needs direct LAN/WAN access for discovery and streaming
    network_mode: host
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
      - VERSION=docker
    volumes:
      - ./config/plex:/config
      - ${MEDIA_ROOT}/media/tv:/tv
      - ${MEDIA_ROOT}/media/movies:/movies
      - ${MEDIA_ROOT}/media/guest-tv:/guest-tv
      - ${MEDIA_ROOT}/media/guest-movies:/guest-movies
    mem_limit: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 30s
      timeout: 5s
      retries: 3


  transmission:
    # transmission v4.0.6
    image: lscr.io/linuxserver/transmission@sha256:d2183a00bbd5dbb083b14dcd65419379bfd91e0965b52849642354ec3d246452
    container_name: transmission
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
      - PEERPORT=51413
    volumes:
      - ./config/transmission:/config
      - ${MEDIA_ROOT}/torrents:/downloads
      - ${MEDIA_ROOT}/watch:/watch
    ports:
      - "127.0.0.1:9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/transmission/rpc || [ $? -eq 22 ]"]
      interval: 30s
      timeout: 5s
      retries: 3


  sonarr:
    # sonarr v4.0.14
    image: lscr.io/linuxserver/sonarr@sha256:21c1c3d52248589bb064f5adafec18cad45812d7a01d317472955eef051e619b
    container_name: sonarr
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "127.0.0.1:8989:8989"
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  radarr:
    # radarr v5.20.2
    image: lscr.io/linuxserver/radarr@sha256:ca43905eaf2dd11425efdcfe184892e43806b1ae0a830440c825cecbc2629cfb
    container_name: radarr
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "127.0.0.1:7878:7878"
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  flaresolverr:
    # flaresolverr v3.3.21
    image: ghcr.io/flaresolverr/flaresolverr@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
    container_name: flaresolverr
    environment:
      - TZ=Europe/Budapest
      - LOG_LEVEL=info
    ports:
      - "127.0.0.1:8191:8191"
    mem_limit: 512m
    restart: unless-stopped


  prowlarr:
    # prowlarr v1.32.2
    image: lscr.io/linuxserver/prowlarr@sha256:a8fe7b9c502f979146b6d0f22438b825c38e068241bb8a708c473062dffdbb03
    container_name: prowlarr
    depends_on:
      - flaresolverr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/prowlarr:/config
    ports:
      - "127.0.0.1:9696:9696"
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  tautulli:
    # tautulli v2.15.1
    image: lscr.io/linuxserver/tautulli@sha256:c75d3410b958399f86b6d1786f7640e91b867b24d154b3f09f9bb3207f2e8b35
    container_name: tautulli
    # host network required: needs to reach Plex on localhost (bridge-to-host blocked by firewall)
    network_mode: host
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/tautulli:/config
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/status"]
      interval: 30s
      timeout: 5s
      retries: 3


  seerr:
    # seerr latest
    image: ghcr.io/seerr-team/seerr@sha256:b35ba0461c4a1033d117ac1e5968fd4cbe777899e4cbfbdeaf3d10a42a0eb7e9
    container_name: seerr
    # host network required: needs to reach Plex, Sonarr, and Radarr on localhost (bridge-to-host blocked by firewall)
    network_mode: host
    environment:
      - TZ=Europe/Budapest
    volumes:
      - ./config/overseerr:/app/config
    mem_limit: 512m
    restart: unless-stopped


  caddy:
    build:
      context: ./caddy
      network: host
    container_name: caddy
    # host network required: needs to reach Plex and Seerr on localhost, and for build (IPv6 unreachable in bridge)
    network_mode: host
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - CADDY_DOMAIN_PLEX=${CADDY_DOMAIN_PLEX}
      - CADDY_DOMAIN_SEERR=${CADDY_DOMAIN_SEERR}
      - CADDY_DOMAIN_STATUS=${CADDY_DOMAIN_STATUS}
      - MAXMIND_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/data:/data
      - ./config/caddy/config:/config
    mem_limit: 512m
    restart: unless-stopped


  duckdns:
    # duckdns latest
    image: lscr.io/linuxserver/duckdns@sha256:afe50a2ef043a63e33ffe6e6e119a7a82db999eab966aef2a33611fd89f81117
    container_name: duckdns
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
      - SUBDOMAINS=${DUCKDNS_SUBDOMAINS}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=ipv4
      - LOG_FILE=true
    volumes:
      - ./config/duckdns:/config
    mem_limit: 128m
    restart: unless-stopped


  dnsmasq:
    # dnsmasq — LAN DNS override for DuckDNS domains (resolves to server IP instead of public IP)
    # host network: binds to SERVER_IP:53 for LAN clients, avoids conflict with systemd-resolved on 127.0.0.53
    build:
      context: ./dnsmasq
    container_name: dnsmasq
    network_mode: host
    environment:
      - SERVER_IP=${SERVER_IP}
      - DNS_UPSTREAM=${DNS_UPSTREAM}
      - CADDY_DOMAIN_PLEX=${CADDY_DOMAIN_PLEX}
      - CADDY_DOMAIN_SEERR=${CADDY_DOMAIN_SEERR}
      - CADDY_DOMAIN_STATUS=${CADDY_DOMAIN_STATUS}
    mem_limit: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nslookup", "${CADDY_DOMAIN_STATUS}", "${SERVER_IP}"]
      interval: 30s
      timeout: 5s
      retries: 3

  uptime-kuma:
    # uptime-kuma v1
    image: louislam/uptime-kuma@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: uptime-kuma
    # host network required: needs to reach all services on localhost (Plex, Tautulli, Seerr on host network)
    network_mode: host
    environment:
      - UPTIME_KUMA_PORT=3001
    volumes:
      - ./config/uptime-kuma:/app/data
    mem_limit: 512m
    restart: unless-stopped

  statuspage:
    build:
      context: ./status-page
    container_name: statuspage
    # host network required: needs to reach all services on localhost (Plex, Sonarr, Radarr, etc.)
    network_mode: host
    environment:
      - SECRET_KEY=${STATUSPAGE_SECRET_KEY}
      - ALLOWED_EMAILS=${STATUSPAGE_ALLOWED_EMAILS}
      - BASE_URL=${STATUSPAGE_BASE_URL}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - TAUTULLI_API_KEY=${TAUTULLI_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - SONARR_GUEST_API_KEY=${SONARR_GUEST_API_KEY}
      - RADARR_GUEST_API_KEY=${RADARR_GUEST_API_KEY}
      - GUEST_QUOTA_GB=${GUEST_QUOTA_GB}
      - SONARR_TRAKT_CLIENT_ID=${SONARR_TRAKT_CLIENT_ID}
      - RADARR_TRAKT_CLIENT_ID=${RADARR_TRAKT_CLIENT_ID}
      - WG_PASSWORD=${WG_PASSWORD}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - TRAKT_LOG=/logs/trakt-sync.log
    volumes:
      - ./config/statuspage:/app/data
      - cron-logs:/logs:ro
    mem_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3

  wg-easy:
    # wg-easy — WireGuard VPN with web UI for peer management
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    # host network required: VPN clients need to reach all services including localhost-bound ones
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - LANG=en
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_PASSWORD_HASH}
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.13.13.x
      - WG_DEFAULT_DNS=${DNS_UPSTREAM}
      - WG_ALLOWED_IPS=${LAN_SUBNET}, 10.13.13.0/24
      - WG_PERSISTENT_KEEPALIVE=25
      - WG_POST_UP=iptables -t nat -A POSTROUTING -s 10.13.13.0/24 ! -o wg0 -j MASQUERADE; iptables -t nat -A POSTROUTING -s 10.13.13.0/24 -d 127.0.0.1 -j MASQUERADE; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 8989 -j DNAT --to-destination 127.0.0.1:8989; iptables -t nat -A PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 7878 -j DNAT --to-destination 127.0.0.1:7878; iptables -t nat -A PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 8990 -j DNAT --to-destination 127.0.0.1:8990; iptables -t nat -A PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 7879 -j DNAT --to-destination 127.0.0.1:7879; iptables -t nat -A PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 9696 -j DNAT --to-destination 127.0.0.1:9696; iptables -t nat -A PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 9091 -j DNAT --to-destination 127.0.0.1:9091; iptables -t nat -A PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 8191 -j DNAT --to-destination 127.0.0.1:8191
      - WG_POST_DOWN=iptables -t nat -D POSTROUTING -s 10.13.13.0/24 ! -o wg0 -j MASQUERADE; iptables -t nat -D POSTROUTING -s 10.13.13.0/24 -d 127.0.0.1 -j MASQUERADE; iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 8989 -j DNAT --to-destination 127.0.0.1:8989; iptables -t nat -D PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 7878 -j DNAT --to-destination 127.0.0.1:7878; iptables -t nat -D PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 8990 -j DNAT --to-destination 127.0.0.1:8990; iptables -t nat -D PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 7879 -j DNAT --to-destination 127.0.0.1:7879; iptables -t nat -D PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 9696 -j DNAT --to-destination 127.0.0.1:9696; iptables -t nat -D PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 9091 -j DNAT --to-destination 127.0.0.1:9091; iptables -t nat -D PREROUTING -i wg0 -d ${SERVER_IP} -p tcp --dport 8191 -j DNAT --to-destination 127.0.0.1:8191
      - UI_TRAFFIC_STATS=true
      - UI_CHART_TYPE=1
    volumes:
      - ./config/wg-easy:/etc/wireguard
    mem_limit: 256m
    restart: unless-stopped

  prunarr:
    # prunarr latest
    image: ghcr.io/haijeploeg/prunarr@sha256:d7a164cd2b35aedd7c916db1dd8898370af13a5099f6f8a1659406bcef42829d
    container_name: prunarr
    # host network required: needs to reach Sonarr, Radarr, and Tautulli on localhost (bridge-to-host blocked by firewall)
    network_mode: host
    entrypoint: ["sh", "-c", "while true; do sleep 86400; done"]
    environment:
      - RADARR_API_KEY=${RADARR_API_KEY}
      - RADARR_URL=http://localhost:7878
      - SONARR_API_KEY=${SONARR_API_KEY}
      - SONARR_URL=http://localhost:8989
      - TAUTULLI_API_KEY=${TAUTULLI_API_KEY}
      - TAUTULLI_URL=http://localhost:8181
      - LOG_LEVEL=INFO
    mem_limit: 256m
    restart: unless-stopped

  sonarr-guest:
    # sonarr-guest — guest pipeline (same image as sonarr)
    image: lscr.io/linuxserver/sonarr@sha256:21c1c3d52248589bb064f5adafec18cad45812d7a01d317472955eef051e619b
    container_name: sonarr-guest
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/sonarr-guest:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "127.0.0.1:8990:8989"
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  radarr-guest:
    # radarr-guest — guest pipeline (same image as radarr)
    image: lscr.io/linuxserver/radarr@sha256:ca43905eaf2dd11425efdcfe184892e43806b1ae0a830440c825cecbc2629cfb
    container_name: radarr-guest
    depends_on:
      - transmission
      - prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Budapest
    volumes:
      - ./config/radarr-guest:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "127.0.0.1:7879:7878"
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  cron:
    build:
      context: .
      dockerfile: cron/Dockerfile
    container_name: cron
    # host network required: scripts need to reach all services on localhost
    network_mode: host
    environment:
      - TZ=Europe/Budapest
      - STATUSPAGE_DB_PATH=/config/statuspage/statuspage.db
    volumes:
      - ./scripts:/scripts:ro
      - ./.env:/config/.env:ro
      - ./config/statuspage:/config/statuspage:ro
      - ./config:/config/all-configs:ro
      - ${MEDIA_ROOT}:/mnt/mediaserver
      - /var/run/docker.sock:/var/run/docker.sock
      - cron-state:/var/tmp
      - cron-logs:/var/log/cron
    mem_limit: 256m
    restart: unless-stopped

  prunarr-guest:
    # prunarr-guest — guest pipeline (same image as prunarr)
    image: ghcr.io/haijeploeg/prunarr@sha256:d7a164cd2b35aedd7c916db1dd8898370af13a5099f6f8a1659406bcef42829d
    container_name: prunarr-guest
    # host network required: needs to reach guest Sonarr, guest Radarr, and Tautulli on localhost
    network_mode: host
    entrypoint: ["sh", "-c", "while true; do sleep 86400; done"]
    environment:
      - RADARR_API_KEY=${RADARR_GUEST_API_KEY}
      - RADARR_URL=http://localhost:7879
      - SONARR_API_KEY=${SONARR_GUEST_API_KEY}
      - SONARR_URL=http://localhost:8990
      - TAUTULLI_API_KEY=${TAUTULLI_API_KEY}
      - TAUTULLI_URL=http://localhost:8181
      - LOG_LEVEL=INFO
    mem_limit: 256m
    restart: unless-stopped

volumes:
  cron-state:
  cron-logs:
