# Forward all queries to the home router
server=192.168.1.1

# Override DuckDNS domains to resolve to freya-pc on LAN
address=/freya-mediaserver.duckdns.org/192.168.1.14
address=/freya-seerr.duckdns.org/192.168.1.14
address=/freya-status.duckdns.org/192.168.1.14

# Don't read /etc/resolv.conf (avoid loops)
no-resolv

# Don't read /etc/hosts
no-hosts

# Cache DNS responses
cache-size=1000

# Log queries (disable if too noisy)
log-queries
