<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Media Server Status</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            margin: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            color: #8892b0;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 0.5rem;
        }
        input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="email"]:focus {
            border-color: #e94560;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1.25rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #c73a52; }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }
        .flash.info { background: rgba(100,150,255,0.15); color: #8ab4f8; }
        .flash.error { background: rgba(233,69,96,0.15); color: #e94560; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='favicon.svg') }}" alt="" width="48" height="48" style="margin-bottom:1rem;">
        <h1>Media Server</h1>
        <p class="subtitle">Enter your email to receive a login link.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST" onsubmit="this.querySelector('button').disabled=true;this.querySelector('button').textContent='Sending…'">
            <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-theme="dark" style="margin-top:1.25rem"></div>
            <button type="submit">Send Login Link</button>
        </form>
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    </div>
</body>
</html>
